name: release-windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      LUMORIX_SIGN_CERT_SHA1: ${{ secrets.LUMORIX_SIGN_CERT_SHA1 }}
      LUMORIX_SIGN_TIMESTAMP_URL: ${{ secrets.LUMORIX_SIGN_TIMESTAMP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Validate release-info against tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $releaseInfo = Get-Content -Raw "release-info.json" | ConvertFrom-Json
          $expectedTag = "v$($releaseInfo.version)"
          $actualTag = "${{ github.ref_name }}"

          if ($actualTag -ne $expectedTag) {
            throw "Release tag mismatch. release-info.json expects $expectedTag but workflow is running for $actualTag."
          }

      - name: Build signed Tauri bundles and updater artifacts
        run: npm run tauri:build

      - name: Prepare latest.json for GitHub Releases updater
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $version = "${{ github.ref_name }}"
          $bundleDir = Join-Path $PWD "src-tauri/target/release/bundle"
          if (-not (Test-Path $bundleDir)) {
            throw "Bundle directory not found: $bundleDir"
          }

          # Use the NSIS exe as the updater artifact (silent install, supports delta updates)
          $signatureFile = Get-ChildItem -Path $bundleDir -Recurse -Filter "*.exe.sig" |
            Select-Object -First 1

          if (-not $signatureFile) {
            throw "No NSIS updater signature file (*.exe.sig) found in bundle directory."
          }

          # Strip the trailing .sig to get the installer path
          $signedAsset = $signatureFile.FullName -replace '\.sig$', ''
          if (-not (Test-Path $signedAsset)) {
            throw "NSIS installer not found at: $signedAsset"
          }

          $releaseAssetDir = Join-Path $PWD "distribution/release-assets"
          New-Item -ItemType Directory -Force -Path $releaseAssetDir | Out-Null
          Get-ChildItem -Path $releaseAssetDir -File -ErrorAction SilentlyContinue | Remove-Item -Force

          # GitHub release downloads normalize spaces in asset names to dots. Publish an
          # explicit dot-safe updater pair and point latest.json at that exact asset.
          $assetName = ([System.IO.Path]::GetFileName($signedAsset) -replace " ", ".")
          $signatureAssetName = "$assetName.sig"
          $releaseInstallerPath = Join-Path $releaseAssetDir $assetName
          $releaseSignaturePath = Join-Path $releaseAssetDir $signatureAssetName
          Copy-Item -Path $signedAsset -Destination $releaseInstallerPath -Force
          Copy-Item -Path $signatureFile.FullName -Destination $releaseSignaturePath -Force

          $signature = (Get-Content -Raw $releaseSignaturePath).Trim()
          $latestPath = Join-Path $PWD "distribution/latest.json"
          $updaterUrl = "https://github.com/${{ github.repository }}/releases/download/$version/$assetName"
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/tag/$version"

          Write-Host "Updater asset URL: $updaterUrl"
          Write-Host "Signature source used: $releaseSignaturePath"
          Write-Host "Signature SHA256: $((Get-FileHash $releaseSignaturePath -Algorithm SHA256).Hash)"

          if (-not (Test-Path $latestPath)) {
            throw "Generated latest.json not found at: $latestPath"
          }

          $existingLatest = Get-Content -Raw $latestPath | ConvertFrom-Json -AsHashtable
          $json = [ordered]@{
            version = $existingLatest.version
            title = $existingLatest.title
            notes = $existingLatest.notes
            notesList = $existingLatest.notesList
            pub_date = $existingLatest.pub_date
            releaseUrl = $releaseUrl
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                url = $updaterUrl
                signature = $signature
              }
            }
          } | ConvertTo-Json -Depth 8

          Set-Content -Path $latestPath -Value $json -Encoding UTF8

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            distribution/release-assets/*
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.zip.sig
            distribution/latest.json
          draft: false
          prerelease: false
          generate_release_notes: true
