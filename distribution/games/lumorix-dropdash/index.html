<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lumorix DropDash</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Lumorix DropDash">
      <section class="stage-wrap">
        <canvas id="gameCanvas" width="960" height="540" aria-label="DropDash playfield"></canvas>

        <div class="hud" aria-live="polite">
          <div>
            <span class="hud-label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="hud-label">Best</span>
            <strong id="bestScore">0</strong>
          </div>
          <div>
            <span class="hud-label">Shield</span>
            <strong id="shieldStatus">Ready</strong>
          </div>
        </div>

        <section id="titleScreen" class="overlay">
          <p class="eyebrow">Lumorix Test Title</p>
          <h1>Lumorix DropDash</h1>
          <p class="intro">Slip between falling shards, grab bright cores, and keep the dash lane alive.</p>
          <div class="control-grid">
            <span>A / Left</span>
            <span>D / Right</span>
            <span>Space to pulse</span>
          </div>
          <button id="startButton" type="button">Start Run</button>
        </section>

        <section id="gameOverScreen" class="overlay hidden">
          <p class="eyebrow">Run Complete</p>
          <h2>Crash Detected</h2>
          <p id="finalScore" class="intro">Score 0</p>
          <button id="restartButton" type="button">Restart</button>
        </section>
      </section>

      <footer>
        <span>Dodge red shards.</span>
        <span>Collect cyan cores.</span>
        <span>Press P to pause.</span>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
