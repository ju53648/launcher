<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#05070d">
    <title>Lumorix DropDash</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2327e5c0'/%3E%3Cstop offset='1' stop-color='%23a7f36a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23070d16'/%3E%3Crect x='6' y='6' width='52' height='52' rx='12' fill='url(%23g)' fill-opacity='.92'/%3E%3Ctext x='32' y='40' font-size='24' font-family='Segoe UI,Arial,sans-serif' font-weight='800' text-anchor='middle' fill='%23020a10'%3EDD%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Lumorix DropDash">
      <section class="stage-wrap">
        <canvas id="gameCanvas" width="960" height="540" aria-label="DropDash playfield"></canvas>

        <div class="hud" aria-live="polite">
          <div>
            <span class="hud-label" id="scoreLabel">Score</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="hud-label" id="bestLabel">Best</span>
            <strong id="bestScore">0</strong>
          </div>
          <div>
            <span class="hud-label" id="shieldLabel">Shield</span>
            <strong id="shieldStatus">Ready</strong>
          </div>
          <div id="hudMode">
            <span class="hud-label" id="modeLabel">Mode</span>
            <strong id="modeDisplay">Classic</strong>
          </div>
          <div id="hudTimer" class="hidden">
            <span class="hud-label" id="timerLabel">Time</span>
            <strong id="timerDisplay">60</strong>
          </div>
        </div>

        <section id="titleScreen" class="overlay">
          <p class="eyebrow" id="titleEyebrow">The Official Release</p>
          <h1>Lumorix DropDash</h1>
          <p class="intro" id="titleIntro">Slip between falling shards, grab bright cores, and keep the dash lane alive.</p>
          <div class="mode-select" id="modeSelect">
            <button class="mode-btn active" data-mode="classic" id="modeBtnClassic" type="button">Classic</button>
            <button class="mode-btn" data-mode="timeattack" id="modeBtnTimeattack" type="button">Time Attack</button>
            <button class="mode-btn" data-mode="endless" id="modeBtnEndless" type="button">Endless</button>
          </div>
          <div class="diff-select" id="diffSelect">
            <button class="diff-btn" data-diff="easy" id="diffBtnEasy" type="button">Easy</button>
            <button class="diff-btn active" data-diff="normal" id="diffBtnNormal" type="button">Normal</button>
            <button class="diff-btn" data-diff="hard" id="diffBtnHard" type="button">Hard</button>
          </div>
          <div class="control-grid">
            <span id="controlLeft">A / Left</span>
            <span id="controlRight">D / Right</span>
            <span id="controlPulse">Space to pulse</span>
          </div>
          <button id="startButton" type="button">Start Run</button>
        </section>

        <section id="gameOverScreen" class="overlay hidden">
          <p class="eyebrow" id="gameOverEyebrow">Run Complete</p>
          <h2 id="gameOverTitle">Crash Detected</h2>
          <p id="finalScore" class="intro">Score 0</p>
          <p id="finalWave" class="intro wave-stat hidden"></p>
          <button id="restartButton" type="button">Restart</button>
        </section>
      </section>

      <footer>
        <span id="footerAvoid">Dodge red shards.</span>
        <span id="footerCollect">Collect cyan cores.</span>
        <span id="footerPause">Press P to pause.</span>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
