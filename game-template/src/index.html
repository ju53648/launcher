<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Lumorix Game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="My Lumorix Game">
      <section class="stage-wrap">
        <canvas id="gameCanvas" width="960" height="540" aria-label="Game playfield"></canvas>

        <div class="hud" aria-live="polite">
          <div>
            <span class="hud-label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="hud-label">Best</span>
            <strong id="bestScore">0</strong>
          </div>
          <div>
            <span class="hud-label">Status</span>
            <strong id="status">Ready</strong>
          </div>
        </div>

        <section id="titleScreen" class="overlay">
          <p class="eyebrow">Lumorix Game</p>
          <h1>My Game</h1>
          <p class="intro">Your game description goes here.</p>
          <div class="control-grid">
            <span>A / Left Arrow</span>
            <span>D / Right Arrow</span>
            <span>Space to Action</span>
          </div>
          <button id="startButton" type="button">Start Game</button>
        </section>

        <section id="gameOverScreen" class="overlay hidden">
          <p class="eyebrow">Game Over</p>
          <h2>Run Complete</h2>
          <p id="finalScore" class="intro">Score: 0</p>
          <button id="restartButton" type="button">Play Again</button>
        </section>
      </section>

      <footer>
        <span>Press P to pause.</span>
        <span>Edit src/main.ts to customize your game.</span>
      </footer>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
